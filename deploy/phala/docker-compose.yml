# Phala Cloud (dstack) deployment for the 0G-PC cloud-TEE gateway.
#
# This runs the `gateway` — the SAME client core as the sidecar, but server-run
# and 0G-operated, meant to run inside an attested CVM (see
# docs/design/cloud-gateway.md §7). dstack's ZT-HTTPS front end terminates TLS
# *inside the enclave* and forwards plaintext to the container, so the gateway
# listens on a plain HTTP socket here — it must NOT do TLS itself.
#
# dstack/tproxy ingress maps container ports to a public HTTPS URL:
#   https://<app-id>-8443.<base_domain>   ->  port 8443 in this CVM
# (the `<app-id>.<base_domain>` form maps to 80/443; the `-<port>` form maps to
# that port. A trailing `s` — `<app-id>-8443s.<base_domain>` — would forward
# encrypted TCP for an app that terminates TLS itself; we don't, dstack does.)
#
# Deploy: reference this compose file from the Phala Cloud dashboard, or via the
# Phala CLI (`phala cvm create --compose deploy/phala/docker-compose.yml`).

services:
  gateway:
    # Published by .github/workflows/docker.yml to GHCR.
    #
    # NOTE: in a TEE the compose file is *measured* into the CVM's attestation,
    # so a floating tag makes the measurement change unpredictably. For a
    # reproducible deployment, pin to an immutable digest instead of `:latest`,
    # e.g.:
    #   image: ghcr.io/0gfoundation/0g-pc-e2ee-gateway@sha256:<digest>
    image: ghcr.io/0gfoundation/0g-pc-e2ee-gateway:latest
    restart: unless-stopped
    ports:
      # host:container — dstack tproxy forwards the public ingress to the host
      # side, so this port is what appears as `<app-id>-8443.<base_domain>`.
      - "8443:8443"
    command:
      # Bind to all interfaces (the binary defaults to localhost, which would be
      # container-local only) so dstack can forward to it.
      - "--listen=0.0.0.0:8443"
      # The gateway routes per request and derives each provider's enc key +
      # signer from the broker, so no provider/key is configured up front. It
      # defaults to the 0G router; uncomment to override.
      # - "--router-url=https://router-api.0g.ai"
    # No secrets or volumes: the gateway holds no pinned provider key, and TLS
    # material is managed by dstack-kms inside the enclave, never by this file.
